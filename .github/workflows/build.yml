name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NativeMattingClient/NativeMattingClient.csproj

      - name: Build
        run: dotnet build NativeMattingClient/NativeMattingClient.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish NativeMattingClient/NativeMattingClient.csproj -c Release -r win-x64 --self-contained false -o artifacts/visual-matting-client

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: visual-matting-client-win-x64
          path: artifacts/visual-matting-client
